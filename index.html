<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>教学采购项目管理</title>
    <link rel="stylesheet" href="styles.css?v=20260709-v1" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark">教</span>
          <span>采购项目管理</span>
        </div>
        <nav id="navList" class="nav-list"></nav>
        <div class="sidebar-bottom">
          <button class="flow-entry-btn" id="flowChartBtn" type="button">流程图</button>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <h1 id="pageTitle">项目立项</h1>
          </div>
          <div class="top-actions">
            <button class="prd-dot" id="prdOpen" type="button" title="查看当前页面 PRD"></button>
          </div>
        </header>

        <section id="dashboard" class="view hidden"></section>
        <section id="moduleView" class="view"></section>
      </main>
    </div>

    <div id="modalMask" class="modal-mask hidden">
      <div class="modal">
        <div class="modal-head">
          <h2 id="modalTitle">新增</h2>
          <button class="icon-btn" id="modalClose" aria-label="关闭">×</button>
        </div>
        <form id="modalForm" class="modal-body"></form>
        <div class="modal-foot">
          <button class="ghost-btn" id="modalCancel" type="button">取消</button>
          <button class="primary-btn" id="modalSave" type="button">保存</button>
        </div>
      </div>
    </div>

    <div id="prdMask" class="modal-mask hidden">
      <div class="prd-modal">
        <div class="modal-head">
          <div>
            <p class="prd-kicker">PRD 产品开发规则</p>
            <h2 id="prdTitle">当前页面 PRD</h2>
          </div>
          <button class="icon-btn" id="prdClose" aria-label="关闭">×</button>
        </div>
        <div id="prdBody" class="prd-body"></div>
        <div class="modal-foot">
          <button class="primary-btn" id="prdConfirm" type="button">我知道了</button>
        </div>
      </div>
    </div>

    <div id="flowMask" class="modal-mask hidden">
      <div class="flow-modal">
        <div class="modal-head">
          <div>
            <p class="prd-kicker">业务流程图 / 操作流程图</p>
            <h2>V1 项目全过程管理流程总览</h2>
          </div>
          <button class="icon-btn" id="flowClose" aria-label="关闭">×</button>
        </div>
        <div id="flowBody" class="flow-body"></div>
        <div class="modal-foot">
          <button class="primary-btn" id="flowConfirm" type="button">我知道了</button>
        </div>
      </div>
    </div>

    <div id="confirmMask" class="modal-mask hidden">
      <div class="confirm-modal">
        <div class="modal-head">
          <div>
            <p class="prd-kicker">二次确认</p>
            <h2 id="confirmTitle">确认操作</h2>
          </div>
          <button class="icon-btn" id="confirmClose" aria-label="关闭">×</button>
        </div>
        <div class="confirm-body">
          <p id="confirmMessage">请确认是否继续执行该操作。</p>
          <div id="confirmSummary" class="confirm-summary"></div>
        </div>
        <div class="modal-foot">
          <button class="ghost-btn" id="confirmCancel" type="button">取消</button>
          <button class="primary-btn" id="confirmOk" type="button">确认</button>
        </div>
      </div>
    </div>

    <aside id="drawer" class="drawer hidden">
      <div class="drawer-head">
        <div>
          <p id="drawerKicker">详情</p>
          <h2 id="drawerTitle">项目名称</h2>
        </div>
        <button class="icon-btn" id="drawerClose" aria-label="关闭">×</button>
      </div>
      <div id="drawerBody" class="drawer-body"></div>
    </aside>

    <div id="toast" class="toast hidden"></div>
    <script src="app.js?v=20260709-v1"></script>
  </body>
</html>
